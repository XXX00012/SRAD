[connectivity]
# Ours: DDR -> PL TopPL computes q0sqr, embeds it in the first unused
# padding column of each J tile, streams the J tile to AIE, then stores
# the AIE J_next stream back to DDR.
nk=TopPL:1:TopPL_1

stream_connect=TopPL_1.out_j:ai_engine_0.ours_plq0_in_j
stream_connect=ai_engine_0.ours_plq0_out_j_next:TopPL_1.in_j_next

# K1/K2 c values stay inside the AIE graph and are not materialized to PLIO/DDR.
