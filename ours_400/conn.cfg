[connectivity]
# Ours400 10-worker / 200-lane board path:
#   10 TopPL CUs each feed 20 AIE lanes.
#   AIE output uses pktmerge<2>, so each TopPL reads
#   10 grouped output streams.
#   Q0Ctrl reduces one partial sum/sum2 packet per TopPL worker and
#   broadcasts the global q0sqr back to each worker.
nk=TopPL:10:TopPL_0.TopPL_1.TopPL_2.TopPL_3.TopPL_4.TopPL_5.TopPL_6.TopPL_7.TopPL_8.TopPL_9

nk=Q0Ctrl:1:Q0Ctrl_1

# VCK190 base platforms normally expose a single DDR/LPDDR SP tag instead of
# indexed Alveo-style DDR[0] banks. Keep all worker AXI ports on the same tag
# so one host BO can be passed to all TopPL CUs.
sp=TopPL_0.image:DDR
sp=TopPL_0.output:DDR
sp=TopPL_1.image:DDR
sp=TopPL_1.output:DDR
sp=TopPL_2.image:DDR
sp=TopPL_2.output:DDR
sp=TopPL_3.image:DDR
sp=TopPL_3.output:DDR
sp=TopPL_4.image:DDR
sp=TopPL_4.output:DDR
sp=TopPL_5.image:DDR
sp=TopPL_5.output:DDR
sp=TopPL_6.image:DDR
sp=TopPL_6.output:DDR
sp=TopPL_7.image:DDR
sp=TopPL_7.output:DDR
sp=TopPL_8.image:DDR
sp=TopPL_8.output:DDR
sp=TopPL_9.image:DDR
sp=TopPL_9.output:DDR
sp=Q0Ctrl_1.debug:DDR

