[connectivity]
# DDR -> PL -> PLIO -> AIE -> PLIO -> PL -> DDR design for the FPGA-v5-style
# SRAD baseline. PL kernels are transport shims only; q0sqr and fused
# SRAD1/SRAD2 are computed inside the single AIE kernel.
nk=LoadFpgaV5:1:LoadFpgaV5_1
nk=StoreFpgaV5:1:StoreFpgaV5_1

stream_connect=LoadFpgaV5_1.out_reduce:ai_engine_0.fpga_v5_in_reduce
stream_connect=LoadFpgaV5_1.out_compute:ai_engine_0.fpga_v5_in_compute
stream_connect=LoadFpgaV5_1.out_lambda:ai_engine_0.fpga_v5_in_lambda
stream_connect=ai_engine_0.fpga_v5_out_j_next:StoreFpgaV5_1.in_j_next
