[connectivity]
# Ours-undivide: DDR -> PL TopPL computes q0sqr, packs J/q0/lambda,
# streams to the fused AIE kernel through PLIO, then stores J_next to DDR.
nk=TopPL:1:TopPL_1

stream_connect=TopPL_1.out_j:ai_engine_0.ours_undivide_plq0_in_j
stream_connect=TopPL_1.out_j_update:ai_engine_0.ours_undivide_plq0_in_j_update
stream_connect=TopPL_1.out_q0sqr:ai_engine_0.ours_undivide_plq0_in_q0sqr
stream_connect=TopPL_1.out_lambda:ai_engine_0.ours_undivide_plq0_in_lambda
stream_connect=ai_engine_0.ours_undivide_plq0_out_j_next:TopPL_1.in_j_next

# There is no K1/K2 boundary in this variant; the current ours raw-c,
# clamp/select, and update stages are fused into one AIE kernel.
