[connectivity]
# Ours-compute: PL TopPL computes q0sqr and writes the scalar packet to DDR.
# The host then forwards that PL-computed packet to AIE K2 through normal GMIO.
nk=TopPL:1:TopPL_1

# No PLIO connection here: q0sqr is forwarded to AIE through GMIO.
# K1/K2 intermediates stay inside the AIE graph and are not materialized to GMIO/DDR.
# K2 deliberately uses the original five-division coefficient expression.
