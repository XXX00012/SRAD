[connectivity]
# Ours2 4-worker / 16-lane validation path:
#   4 TopPL CUs each feed 4 AIE lanes.
#   Q0Ctrl reduces one partial sum/sum2 packet per TopPL worker and
#   broadcasts the global q0sqr back to each worker.
nk=TopPL:4:TopPL_0.TopPL_1.TopPL_2.TopPL_3
nk=Q0Ctrl:1:Q0Ctrl_1

# VCK190 base platforms normally expose a single DDR/LPDDR SP tag instead of
# indexed Alveo-style DDR[0] banks. Keep all worker AXI ports on the same tag
# so one host BO can be passed to all TopPL CUs.
sp=TopPL_0.image:DDR
sp=TopPL_1.image:DDR
sp=TopPL_2.image:DDR
sp=TopPL_3.image:DDR
sp=TopPL_0.output:DDR
sp=TopPL_1.output:DDR
sp=TopPL_2.output:DDR
sp=TopPL_3.output:DDR
sp=Q0Ctrl_1.debug:DDR

stream_connect=TopPL_0.out_j_0:ai_engine_0.ours_plq0_in_j_0:32
stream_connect=TopPL_0.out_j_1:ai_engine_0.ours_plq0_in_j_1:32
stream_connect=TopPL_0.out_j_2:ai_engine_0.ours_plq0_in_j_2:32
stream_connect=TopPL_0.out_j_3:ai_engine_0.ours_plq0_in_j_3:32
stream_connect=TopPL_1.out_j_0:ai_engine_0.ours_plq0_in_j_4:32
stream_connect=TopPL_1.out_j_1:ai_engine_0.ours_plq0_in_j_5:32
stream_connect=TopPL_1.out_j_2:ai_engine_0.ours_plq0_in_j_6:32
stream_connect=TopPL_1.out_j_3:ai_engine_0.ours_plq0_in_j_7:32
stream_connect=TopPL_2.out_j_0:ai_engine_0.ours_plq0_in_j_8:32
stream_connect=TopPL_2.out_j_1:ai_engine_0.ours_plq0_in_j_9:32
stream_connect=TopPL_2.out_j_2:ai_engine_0.ours_plq0_in_j_10:32
stream_connect=TopPL_2.out_j_3:ai_engine_0.ours_plq0_in_j_11:32
stream_connect=TopPL_3.out_j_0:ai_engine_0.ours_plq0_in_j_12:32
stream_connect=TopPL_3.out_j_1:ai_engine_0.ours_plq0_in_j_13:32
stream_connect=TopPL_3.out_j_2:ai_engine_0.ours_plq0_in_j_14:32
stream_connect=TopPL_3.out_j_3:ai_engine_0.ours_plq0_in_j_15:32

stream_connect=ai_engine_0.ours_plq0_out_j_next_0:TopPL_0.in_j_next_0:32
stream_connect=ai_engine_0.ours_plq0_out_j_next_1:TopPL_0.in_j_next_1:32
stream_connect=ai_engine_0.ours_plq0_out_j_next_2:TopPL_0.in_j_next_2:32
stream_connect=ai_engine_0.ours_plq0_out_j_next_3:TopPL_0.in_j_next_3:32
stream_connect=ai_engine_0.ours_plq0_out_j_next_4:TopPL_1.in_j_next_0:32
stream_connect=ai_engine_0.ours_plq0_out_j_next_5:TopPL_1.in_j_next_1:32
stream_connect=ai_engine_0.ours_plq0_out_j_next_6:TopPL_1.in_j_next_2:32
stream_connect=ai_engine_0.ours_plq0_out_j_next_7:TopPL_1.in_j_next_3:32
stream_connect=ai_engine_0.ours_plq0_out_j_next_8:TopPL_2.in_j_next_0:32
stream_connect=ai_engine_0.ours_plq0_out_j_next_9:TopPL_2.in_j_next_1:32
stream_connect=ai_engine_0.ours_plq0_out_j_next_10:TopPL_2.in_j_next_2:32
stream_connect=ai_engine_0.ours_plq0_out_j_next_11:TopPL_2.in_j_next_3:32
stream_connect=ai_engine_0.ours_plq0_out_j_next_12:TopPL_3.in_j_next_0:32
stream_connect=ai_engine_0.ours_plq0_out_j_next_13:TopPL_3.in_j_next_1:32
stream_connect=ai_engine_0.ours_plq0_out_j_next_14:TopPL_3.in_j_next_2:32
stream_connect=ai_engine_0.ours_plq0_out_j_next_15:TopPL_3.in_j_next_3:32

# Q0 is a PL-to-PL feedback loop. Insert link FIFOs so blocking AXIS reads
# and writes cannot deadlock on backpressure during the stats/q0 handshake.
stream_connect=TopPL_0.stat_to_q0:Q0Ctrl_1.stat_in_0:16
stream_connect=TopPL_1.stat_to_q0:Q0Ctrl_1.stat_in_1:16
stream_connect=TopPL_2.stat_to_q0:Q0Ctrl_1.stat_in_2:16
stream_connect=TopPL_3.stat_to_q0:Q0Ctrl_1.stat_in_3:16

stream_connect=Q0Ctrl_1.q0_out_0:TopPL_0.q0_from_ctrl:16
stream_connect=Q0Ctrl_1.q0_out_1:TopPL_1.q0_from_ctrl:16
stream_connect=Q0Ctrl_1.q0_out_2:TopPL_2.q0_from_ctrl:16
stream_connect=Q0Ctrl_1.q0_out_3:TopPL_3.q0_from_ctrl:16

# K1/K2 c values stay inside the AIE graph and are not materialized to PLIO/DDR.
