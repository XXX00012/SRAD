[connectivity]
# TopPL computes q0sqr once from the full OpenCL-layout image and broadcasts it
# with each full-image GraphCoeff input packet.
nk=TopPL:1:TopPL_1
nk=StoreCoeff:1:StoreCoeff_1
nk=LoadUpdate:1:LoadUpdate_1
nk=StoreUpdate:1:StoreUpdate_1

stream_connect=TopPL_1.out_j:ai_engine_0.coeff_in_j
stream_connect=TopPL_1.out_q0sqr:ai_engine_0.coeff_in_q0sqr
stream_connect=ai_engine_0.coeff_out_c:StoreCoeff_1.in_c
stream_connect=ai_engine_0.coeff_out_dN:StoreCoeff_1.in_dN
stream_connect=ai_engine_0.coeff_out_dS:StoreCoeff_1.in_dS
stream_connect=ai_engine_0.coeff_out_dW:StoreCoeff_1.in_dW
stream_connect=ai_engine_0.coeff_out_dE:StoreCoeff_1.in_dE

stream_connect=LoadUpdate_1.out_j:ai_engine_0.update_in_j
stream_connect=LoadUpdate_1.out_c:ai_engine_0.update_in_c
stream_connect=LoadUpdate_1.out_dN:ai_engine_0.update_in_dN
stream_connect=LoadUpdate_1.out_dS:ai_engine_0.update_in_dS
stream_connect=LoadUpdate_1.out_dW:ai_engine_0.update_in_dW
stream_connect=LoadUpdate_1.out_dE:ai_engine_0.update_in_dE
stream_connect=LoadUpdate_1.out_lambda:ai_engine_0.update_in_lambda
stream_connect=ai_engine_0.update_out_j_next:StoreUpdate_1.in_j_next
