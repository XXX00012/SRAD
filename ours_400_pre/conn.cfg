# Ours_400 split PL path:
#   4 TopPL CUs feed 200 AIE lanes, 50 lanes per worker.
#   Q0Ctrl reduces 4 partial sum/sum2 streams and broadcasts global q0sqr.
#   Output side keeps pktmerge<2>: 200 lane outputs -> 100 packetized output PLIOs.
