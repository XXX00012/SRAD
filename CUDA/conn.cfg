[connectivity]
# DDR -> PL HLS movers -> PLIO -> AIE, with AIE output streams captured by PL.
# All global arrays follow OpenCL v0 linear layout: row + Nr * col.
# GraphPrepare materializes d_sums/d_sums2 to DDR. GraphReduce reads those
# arrays, writes total sum/sum2 to DDR, and the host computes q0sqr.
nk=LoadPrepare:1:LoadPrepare_1
nk=StorePrepare:1:StorePrepare_1
nk=LoadReduce:1:LoadReduce_1
nk=StoreReduce:1:StoreReduce_1
nk=LoadCoeff:1:LoadCoeff_1
nk=StoreCoeff:1:StoreCoeff_1
nk=LoadUpdate:1:LoadUpdate_1
nk=StoreUpdate:1:StoreUpdate_1

stream_connect=LoadPrepare_1.out_j:ai_engine_0.prepare_in_j
stream_connect=ai_engine_0.prepare_out_sums:StorePrepare_1.in_sums
stream_connect=ai_engine_0.prepare_out_sums2:StorePrepare_1.in_sums2

stream_connect=LoadReduce_1.out_sums:ai_engine_0.reduce_in_sums
stream_connect=LoadReduce_1.out_sums2:ai_engine_0.reduce_in_sums2
stream_connect=ai_engine_0.reduce_out_stats:StoreReduce_1.in_stats

stream_connect=LoadCoeff_1.out_j:ai_engine_0.coeff_in_j
stream_connect=LoadCoeff_1.out_q0sqr:ai_engine_0.coeff_in_q0sqr
stream_connect=ai_engine_0.coeff_out_c:StoreCoeff_1.in_c
stream_connect=ai_engine_0.coeff_out_dN:StoreCoeff_1.in_dN
stream_connect=ai_engine_0.coeff_out_dS:StoreCoeff_1.in_dS
stream_connect=ai_engine_0.coeff_out_dW:StoreCoeff_1.in_dW
stream_connect=ai_engine_0.coeff_out_dE:StoreCoeff_1.in_dE

stream_connect=LoadUpdate_1.out_j:ai_engine_0.update_in_j
stream_connect=LoadUpdate_1.out_c:ai_engine_0.update_in_c
stream_connect=LoadUpdate_1.out_dN:ai_engine_0.update_in_dN
stream_connect=LoadUpdate_1.out_dS:ai_engine_0.update_in_dS
stream_connect=LoadUpdate_1.out_dW:ai_engine_0.update_in_dW
stream_connect=LoadUpdate_1.out_dE:ai_engine_0.update_in_dE
stream_connect=LoadUpdate_1.out_lambda:ai_engine_0.update_in_lambda
stream_connect=ai_engine_0.update_out_j_next:StoreUpdate_1.in_j_next
