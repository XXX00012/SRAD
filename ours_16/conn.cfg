[connectivity]
# Ours16 1-worker / 20-lane validation path:
#   1 TopPL CUs each feed 20 AIE lanes.
#   Q0Ctrl reduces one partial sum/sum2 packet per TopPL worker and
#   broadcasts the global q0sqr back to each worker.
nk=TopPL:1:TopPL_0

nk=Q0Ctrl:1:Q0Ctrl_1

# VCK190 base platforms normally expose a single DDR/LPDDR SP tag instead of
# indexed Alveo-style DDR[0] banks. Keep all worker AXI ports on the same tag
# so one host BO can be passed to all TopPL CUs.
sp=TopPL_0.image:DDR
sp=TopPL_0.output:DDR
sp=Q0Ctrl_1.debug:DDR

stream_connect=TopPL_0.out_j_0:ai_engine_0.ours_plq0_in_j_0:32
stream_connect=TopPL_0.out_j_1:ai_engine_0.ours_plq0_in_j_1:32
stream_connect=TopPL_0.out_j_2:ai_engine_0.ours_plq0_in_j_2:32
stream_connect=TopPL_0.out_j_3:ai_engine_0.ours_plq0_in_j_3:32
stream_connect=TopPL_0.out_j_4:ai_engine_0.ours_plq0_in_j_4:32
stream_connect=TopPL_0.out_j_5:ai_engine_0.ours_plq0_in_j_5:32
stream_connect=TopPL_0.out_j_6:ai_engine_0.ours_plq0_in_j_6:32
stream_connect=TopPL_0.out_j_7:ai_engine_0.ours_plq0_in_j_7:32
stream_connect=TopPL_0.out_j_8:ai_engine_0.ours_plq0_in_j_8:32
stream_connect=TopPL_0.out_j_9:ai_engine_0.ours_plq0_in_j_9:32
stream_connect=TopPL_0.out_j_10:ai_engine_0.ours_plq0_in_j_10:32
stream_connect=TopPL_0.out_j_11:ai_engine_0.ours_plq0_in_j_11:32
stream_connect=TopPL_0.out_j_12:ai_engine_0.ours_plq0_in_j_12:32
stream_connect=TopPL_0.out_j_13:ai_engine_0.ours_plq0_in_j_13:32
stream_connect=TopPL_0.out_j_14:ai_engine_0.ours_plq0_in_j_14:32
stream_connect=TopPL_0.out_j_15:ai_engine_0.ours_plq0_in_j_15:32
stream_connect=TopPL_0.out_j_16:ai_engine_0.ours_plq0_in_j_16:32
stream_connect=TopPL_0.out_j_17:ai_engine_0.ours_plq0_in_j_17:32
stream_connect=TopPL_0.out_j_18:ai_engine_0.ours_plq0_in_j_18:32
stream_connect=TopPL_0.out_j_19:ai_engine_0.ours_plq0_in_j_19:32

stream_connect=ai_engine_0.ours_plq0_out_j_next_0:TopPL_0.in_j_next_0:32
stream_connect=ai_engine_0.ours_plq0_out_j_next_1:TopPL_0.in_j_next_1:32
stream_connect=ai_engine_0.ours_plq0_out_j_next_2:TopPL_0.in_j_next_2:32
stream_connect=ai_engine_0.ours_plq0_out_j_next_3:TopPL_0.in_j_next_3:32
stream_connect=ai_engine_0.ours_plq0_out_j_next_4:TopPL_0.in_j_next_4:32
stream_connect=ai_engine_0.ours_plq0_out_j_next_5:TopPL_0.in_j_next_5:32
stream_connect=ai_engine_0.ours_plq0_out_j_next_6:TopPL_0.in_j_next_6:32
stream_connect=ai_engine_0.ours_plq0_out_j_next_7:TopPL_0.in_j_next_7:32
stream_connect=ai_engine_0.ours_plq0_out_j_next_8:TopPL_0.in_j_next_8:32
stream_connect=ai_engine_0.ours_plq0_out_j_next_9:TopPL_0.in_j_next_9:32

# Q0 is a PL-to-PL feedback loop. Insert link FIFOs so blocking AXIS reads
# and writes cannot deadlock on backpressure during the stats/q0 handshake.
stream_connect=TopPL_0.stat_to_q0:Q0Ctrl_1.stat_in_0:16

stream_connect=Q0Ctrl_1.q0_out_0:TopPL_0.q0_from_ctrl:16

# K1/K2 c values stay inside the AIE graph and are not materialized to PLIO/DDR.
