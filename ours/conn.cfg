[connectivity]
# Ours 4-worker validation path:
#   4 TopPLWorker CUs feed 4 AIE lanes.
#   Q0Ctrl reduces per-worker partial sum/sum2 and broadcasts global q0sqr.
nk=TopPLWorker:4:TopPL_0.TopPL_1.TopPL_2.TopPL_3
nk=Q0Ctrl:1:Q0Ctrl_1

stream_connect=TopPL_0.out_j:ai_engine_0.ours_plq0_in_j_0
stream_connect=TopPL_1.out_j:ai_engine_0.ours_plq0_in_j_1
stream_connect=TopPL_2.out_j:ai_engine_0.ours_plq0_in_j_2
stream_connect=TopPL_3.out_j:ai_engine_0.ours_plq0_in_j_3

stream_connect=ai_engine_0.ours_plq0_out_j_next_0:TopPL_0.in_j_next
stream_connect=ai_engine_0.ours_plq0_out_j_next_1:TopPL_1.in_j_next
stream_connect=ai_engine_0.ours_plq0_out_j_next_2:TopPL_2.in_j_next
stream_connect=ai_engine_0.ours_plq0_out_j_next_3:TopPL_3.in_j_next

stream_connect=TopPL_0.stat_to_q0:Q0Ctrl_1.stat_in_0
stream_connect=TopPL_1.stat_to_q0:Q0Ctrl_1.stat_in_1
stream_connect=TopPL_2.stat_to_q0:Q0Ctrl_1.stat_in_2
stream_connect=TopPL_3.stat_to_q0:Q0Ctrl_1.stat_in_3

stream_connect=Q0Ctrl_1.q0_out_0:TopPL_0.q0_from_ctrl
stream_connect=Q0Ctrl_1.q0_out_1:TopPL_1.q0_from_ctrl
stream_connect=Q0Ctrl_1.q0_out_2:TopPL_2.q0_from_ctrl
stream_connect=Q0Ctrl_1.q0_out_3:TopPL_3.q0_from_ctrl

# K1/K2 c values stay inside the AIE graph and are not materialized to PLIO/DDR.
